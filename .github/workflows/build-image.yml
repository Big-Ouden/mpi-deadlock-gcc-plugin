name: Build CI image

on:
  push:
    paths:
      - '.ci/Dockerfile'
  workflow_dispatch:  # allow manual trigger

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .ci
          push: true
          tags: ghcr.io/big_ouden/gcc12-mpi:latest
